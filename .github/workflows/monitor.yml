name: Melon Ticket Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run monitor
        uses: ./
        with:
          product-id: "212702"      # 这里填真实的商品ID
          schedule-id: "100001"      # 这里填真实的场次ID
          seat-id: "681,785,786,787,788,789,697,698,699,700"    # 如果需要指定座位
    
