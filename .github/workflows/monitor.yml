name: Melon Ticket Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run monitor
        env:
          PRODUCT_ID: "123456"  # 这里先填测试ID
          SCHEDULE_ID: "789012"  # 这里先填测试ID
        run: npm start
