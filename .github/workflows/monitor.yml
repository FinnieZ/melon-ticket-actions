name: Melon Ticket Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run monitor
        uses: ./
        with:
          product-id: "212702"
          schedule-id: "100001"
          seat-id: "681"
          slack-incoming-webhook-url: ${{ secrets.SLACK_WEBHOOK }}
