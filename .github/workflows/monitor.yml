name: Melon Ticket Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: Install dependencies
        run: |
          npm install
          npm run build  # 增加编译步骤
          
      - name: Run monitor
        env:
          PRODUCT_ID: "123456"
          SCHEDULE_ID: "789012"
        run: npm start
